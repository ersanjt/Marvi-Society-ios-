name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "infra/supabase/migrations/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run web:build

      - name: Deploy to Vercel
        if: env.VERCEL_TOKEN != ''
        working-directory: apps/web
        run: npx vercel deploy --prod --token "$VERCEL_TOKEN"

      - name: Skip deploy (no VERCEL_TOKEN)
        if: env.VERCEL_TOKEN == ''
        run: |
          echo "::notice::Set VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID to enable automatic deploy."
          echo "Build succeeded — deploy skipped."

      - name: Verify production health
        if: env.VERCEL_TOKEN != ''
        env:
          SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://marvisociety.com' }}
        run: bash scripts/deploy/verify-web-deploy.sh
