# Marvi Society — Supabase local config
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "marvi-society"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://marvisociety.com"
additional_redirect_urls = [
  "https://marvisociety.com/auth/reset-password",
  "https://marvisociety.com/auth/callback",
  "https://marvisociety.com/portal/dashboard",
  "https://marvisociety.com/portal/login",
  "http://localhost:3000/auth/reset-password",
  "http://localhost:3000/auth/callback",
  "http://localhost:3000/portal/dashboard",
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "10MiB"
